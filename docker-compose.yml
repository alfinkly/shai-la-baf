version: '3.8'

services:
  zoom-transcript-extractor:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ZOOM_WEBHOOK_TOKEN=${ZOOM_WEBHOOK_TOKEN}
      - HOST=0.0.0.0
      - PORT=8000
    env_file:
      - .env
    volumes:
      # Optional: persist logs
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s